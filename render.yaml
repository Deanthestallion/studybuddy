# Render Blueprint — single FREE all-in-one service (no expiring resources).
#
# One Docker web service serves the API + the web app on one origin.
# Database is EXTERNAL free Neon Postgres (permanent — Render's own free
# Postgres expires after 30 days, so we don't use it). Redis is in-memory
# (REDIS_MOCK), so there's nothing else to provision.
#
# Deploy: New ▸ Blueprint ▸ connect this repo ▸ Apply, then paste the two
# `sync: false` secrets (DATABASE_URL from Neon, OPENAI_API_KEY). See DEPLOY.md.
# Note: the free web service sleeps after ~15 min idle (≈30–60s cold start).

services:
  - type: web
    name: studybuddy
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_WEB
        value: "1"
      - key: REDIS_MOCK
        value: "1"
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      # ↓ Paste these in the Render dashboard (Environment) — never commit them:
      - key: DATABASE_URL # Neon connection string (postgresql://…?sslmode=require)
        sync: false
      - key: OPENAI_API_KEY # your OpenAI key (enables the AI features)
        sync: false
